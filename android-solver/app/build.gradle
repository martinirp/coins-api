plugins {
    id 'com.android.application'
}

android {
    namespace 'com.coinsapi.solver'
    compileSdk 34

    defaultConfig {
        applicationId "com.coinsapi.solver"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'org.nanohttpd:nanohttpd:2.3.1'
}
